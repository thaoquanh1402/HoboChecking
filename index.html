<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yu-Gi-Oh! Duel Field & Dual Timer Calculator</title>
    <style>
        :root {
            --p1-neon: #00f0ff;
            --p1-glow: rgba(0, 240, 255, 0.4);
            --p1-bg: rgba(0, 40, 80, 0.25);
            
            --p2-neon: #ff0066;
            --p2-glow: rgba(255, 0, 102, 0.4);
            --p2-bg: rgba(80, 0, 40, 0.25);
            
            --counter-color: #00ffaa;
            --counter-glow: rgba(0, 255, 170, 0.5);
            
            --token-color: #ffd700;
            --token-glow: rgba(255, 215, 0, 0.5);
            
            --bg-dark: #0a0712;
            --panel-border: #2d1f4e;
        }

        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 30% 20%, rgba(40, 20, 70, 0.7) 0%, transparent 60%),
                radial-gradient(circle at 70% 80%, rgba(15, 50, 90, 0.7) 0%, transparent 60%);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* THANH ĐIỀU KHIỂN TRUNG TÂM */
        .center-tools {
            background: rgba(12, 8, 22, 0.95);
            border-top: 2px solid var(--panel-border);
            border-bottom: 2px solid var(--panel-border);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
            z-index: 100;
            box-shadow: 0 0 25px rgba(0,0,0,0.9);
            padding: 8px 15px;
        }

        .util-btns {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tool-btn {
            background: #1d1436;
            border: 1px solid #48338a;
            color: #ddd;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.15s;
        }
        .tool-btn:active {
            background: #48338a;
            color: #fff;
            transform: scale(0.95);
        }
        .btn-reset-match {
            background: linear-gradient(45deg, #d60056, #8500d6);
            border: none;
            color: white;
            box-shadow: 0 0 12px rgba(214,0,86,0.4);
        }

        /* KHU VỰC SÂN ĐẤU */
        .duel-arena {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .player-half {
            flex: 1;
            display: grid;
            grid-template-columns: 220px 1fr 240px;
            grid-gap: 10px;
            padding: 10px;
            position: relative;
            align-items: center;
            overflow: hidden;
        }

        /* XOAY NGƯỢC 180 ĐỘ CHO PLAYER 2 */
        #player-2-side {
            transform: rotate(180deg);
            border-bottom: 1px solid rgba(255, 0, 102, 0.15);
        }
        #player-1-side {
            border-top: 1px solid rgba(0, 240, 255, 0.15);
        }

        /* KHỐI HIỂN THỊ ĐIỂM GỐC (LP) VÀ ĐỒNG HỒ */
        .lp-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            height: 100%;
            padding-left: 10px;
        }

        .player-tag {
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 2px;
        }
        #player-1-side .player-tag { color: var(--p1-neon); text-shadow: 0 0 5px var(--p1-glow); }
        #player-2-side .player-tag { color: var(--p2-neon); text-shadow: 0 0 5px var(--p2-glow); }

        .lp-value {
            font-size: 4.2rem;
            font-weight: 900;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1;
            margin: 4px 0;
        }
        #player-1-side .lp-value { color: var(--p1-neon); text-shadow: 0 0 12px var(--p1-neon); }
        #player-2-side .lp-value { color: var(--p2-neon); text-shadow: 0 0 12px var(--p2-neon); }
        
        .lp-value.dead {
            color: #3a3a3a !important;
            text-shadow: none !important;
            text-decoration: line-through;
        }

        .change-log {
            font-size: 1.1rem;
            font-weight: bold;
            height: 22px;
            margin-bottom: 8px;
            font-family: monospace;
        }

        /* WIDGET ĐỒNG HỒ ĐẾM NGƯỢC CÁ NHÂN */
        .timer-widget {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(10, 5, 20, 0.8);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 6px 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 180px;
        }
        #player-1-side .timer-widget { border-color: rgba(0, 240, 255, 0.3); }
        #player-2-side .timer-widget { border-color: rgba(255, 0, 102, 0.3); }

        .timer-display {
            font-size: 1.5rem;
            font-family: monospace;
            font-weight: 900;
            color: #ffcc00;
            letter-spacing: 2px;
            text-shadow: 0 0 5px rgba(255,204,0,0.5);
            transition: color 0.3s;
            margin-bottom: 4px;
        }
        .timer-controls {
            display: flex;
            gap: 4px;
            width: 100%;
            justify-content: space-between;
        }
        .t-btn {
            flex: 1;
            background: #2a1f42;
            border: 1px solid #48338a;
            color: #fff;
            border-radius: 4px;
            padding: 4px 0;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .t-btn:active { background: #48338a; }
        .t-btn.play-btn { color: #44ff88; }
        .t-btn.pause-btn { color: #ffcc00; }
        .t-btn.add-btn { color: #00f0ff; }

        /* THẢM ĐẤU */
        .playmat-grid {
            display: grid;
            grid-template-rows: repeat(2, 1fr);
            grid-gap: 8px;
            height: 100%;
            width: 100%;
        }
        
        .mat-row {
            display: grid;
            grid-template-columns: 1fr repeat(5, 1.2fr) 1fr;
            grid-gap: 8px;
        }

        /* Ô CHỨA LÁ BÀI */
        .card-zone {
            border: 1px solid #322554;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 4px;
            font-size: 0.65rem;
            text-align: center;
            font-weight: bold;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            position: relative;
            min-height: 90px;
        }
        
        #player-1-side .card-zone { background: var(--p1-bg); border-color: rgba(0, 240, 255, 0.2); color: rgba(0, 240, 255, 0.7); }
        #player-2-side .card-zone { background: var(--p2-bg); border-color: rgba(255, 0, 102, 0.2); color: rgba(255, 0, 102, 0.7); }

        .zone-title {
            font-size: 0.55rem;
            opacity: 0.8;
            text-transform: uppercase;
            pointer-events: none;
            margin-bottom: 2px;
            width: 100%;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 2px;
        }

        /* TOKEN */
        .token-container {
            width: 100%;
            margin-top: 2px;
            margin-bottom: 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 24px;
        }
        .btn-add-token {
            background: rgba(255, 215, 0, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.4);
            color: var(--token-color);
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 3px;
            cursor: pointer;
            margin-top: 2px;
            transition: 0.2s;
        }
        .btn-add-token:active { background: rgba(255, 215, 0, 0.4); }
        .token-display {
            display: none;
            flex-direction: column;
            align-items: center;
            background: rgba(20, 15, 10, 0.8);
            border: 1px solid var(--token-color);
            border-radius: 4px;
            padding: 2px 4px;
            width: 95%;
            box-shadow: 0 0 5px var(--token-glow);
        }
        .token-display.active { display: flex; }
        .token-stats {
            font-size: 0.65rem;
            color: var(--token-color);
            line-height: 1.2;
            cursor: pointer;
        }
        .btn-remove-token {
            font-size: 0.5rem;
            color: #ff4444;
            background: transparent;
            border: none;
            cursor: pointer;
            margin-top: 2px;
            text-decoration: underline;
        }

        /* SPELL COUNTER */
        .spell-counter-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: auto;
        }
        .counter-badge {
            font-size: 0.8rem;
            color: var(--counter-color);
            text-shadow: 0 0 6px var(--counter-glow);
            font-family: monospace;
            font-weight: 900;
            margin-bottom: 2px;
            visibility: hidden;
        }
        .counter-badge.active { visibility: visible; }
        .counter-btns {
            display: flex;
            width: 100%;
            justify-content: space-between;
            gap: 4px;
        }
        .c-btn {
            flex: 1;
            height: 18px;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
        }
        .c-btn:active { background: rgba(255, 255, 255, 0.3); }
        .c-btn.plus { color: #00ffaa; background: rgba(0, 255, 170, 0.15); }
        .c-btn.minus { color: #ff5555; background: rgba(255, 85, 85, 0.15); }

        /* BÀN PHÍM BẤM SỐ (KEYPAD) */
        .calculator-box {
            background: rgba(12, 6, 22, 0.85);
            border: 1.5px solid var(--panel-border);
            border-radius: 12px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            width: 236px;
        }
        #player-1-side .calculator-box { border-color: rgba(0, 240, 255, 0.25); }
        #player-2-side .calculator-box { border-color: rgba(255, 0, 102, 0.25); }

        .screen-row {
            display: flex;
            width: 100%;
            gap: 5px;
            margin-bottom: 6px;
        }

        .input-screen {
            flex: 1;
            height: 36px;
            background: #000000;
            border-radius: 6px;
            border: 1px solid #3a2566;
            color: #00ffaa;
            text-shadow: 0 0 6px rgba(0,255,170,0.6);
            font-family: monospace;
            font-size: 1.4rem;
            text-align: right;
            padding: 4px 8px;
        }

        .key-half {
            width: 50px;
            background: #3d2c16;
            border-color: #694a22;
            color: #ffcc00;
            font-size: 1.1rem;
        }
        .key-half:active { background: #694a22; }

        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 50px);
            grid-gap: 5px;
        }

        .key {
            height: 36px;
            background: #20153d;
            border: 1px solid #3f2b75;
            color: #ffffff;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .key:active { background: #4b338c; }
        .key-clear { background: #392c47; border-color: #5c4373; color: #ffcc00; }
        .key-op { font-size: 1.2rem; }
        .key-plus { background: #134226; border-color: #1f6b3e; color: #44ff88; }
        .key-minus { background: #471523; border-color: #732037; color: #ff5577; }

        /* MODAL & OVERLAYS */
        .overlay-result, .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .overlay-text-box {
            background: rgba(12, 6, 26, 0.98);
            border: 2px solid #8500d6;
            box-shadow: 0 0 35px rgba(133,0,214,0.7);
            padding: 25px 45px;
            border-radius: 14px;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            animation: popIn 0.25s ease-out;
        }

        .modal-content {
            background: #160e2a;
            border: 2px solid var(--token-color);
            box-shadow: 0 0 20px var(--token-glow);
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            animation: popIn 0.2s ease-out;
        }
        .modal-content h3 { margin: 0 0 10px 0; color: var(--token-color); }
        .modal-content p { margin: 0 0 15px 0; font-size: 0.9rem; color: #aaa; }
        .input-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .input-group label { font-weight: bold; color: #fff; }
        .input-group input {
            width: 70%;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            border-radius: 4px;
            font-size: 1.1rem;
            text-align: center;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-actions button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .modal-actions .btn-cancel { background: #444; color: #fff; }
        .modal-actions .btn-confirm { background: var(--token-color); color: #000; }

        @keyframes popIn {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 900px) {
            body { height: auto; overflow: auto; }
            .player-half {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto;
                height: auto;
                grid-gap: 15px;
                padding: 15px;
            }
            .lp-panel { align-items: center; padding-left: 0; }
            .timer-widget { max-width: 250px; }
            .calculator-box { width: 100%; max-width: 280px; margin: 0 auto; }
            .keyboard-grid { grid-template-columns: repeat(4, 1fr); width: 100%; }
            .mat-row { grid-template-columns: repeat(7, 1fr); }
            .card-zone { min-height: 80px; }
            .zone-title { font-size: 0.5rem; }
        }
    </style>
</head>
<body>

    <!-- P2 (XOAY NGƯỢC 180 ĐỘ) -->
    <div id="player-2-side" class="player-half">
        <div class="lp-panel">
            <div class="player-tag">PLAYER 2 (OPPONENT)</div>
            <div id="p2-lp" class="lp-value">8000</div>
            <div id="p2-log" class="change-log"></div>
            
            <!-- ĐỒNG HỒ P2 -->
            <div class="timer-widget">
                <div class="timer-display" id="p2-timer-display">03:00</div>
                <div class="timer-controls">
                    <button class="t-btn play-btn" onclick="startTimer(2)">▶️ Play</button>
                    <button class="t-btn pause-btn" onclick="pauseTimer(2)">⏸️ Pause</button>
                    <button class="t-btn add-btn" onclick="addTime(2)">+30s</button>
                </div>
            </div>
        </div>

        <div class="playmat-grid">
            <div class="mat-row">
                <div class="card-zone"><div class="zone-title">EXTRA</div></div>
                <script>
                    for(let i=1; i<=5; i++) {
                        document.write(`
                        <div class="card-zone">
                            <div class="zone-title">S/T ${i}</div>
                            <div class="spell-counter-container">
                                <div class="counter-badge" id="p2-st${i}-badge">🔮 0</div>
                                <div class="counter-btns">
                                    <button class="c-btn minus" onclick="modZoneCounter('p2-st${i}-badge', -1)">-</button>
                                    <button class="c-btn plus" onclick="modZoneCounter('p2-st${i}-badge', 1)">+</button>
                                </div>
                            </div>
                        </div>`);
                    }
                </script>
                <div class="card-zone"><div class="zone-title">DECK</div></div>
            </div>
            
            <div class="mat-row">
                <div class="card-zone">
                    <div class="zone-title">FIELD</div>
                    <div class="spell-counter-container">
                        <div class="counter-badge" id="p2-field-badge">🔮 0</div>
                        <div class="counter-btns">
                            <button class="c-btn minus" onclick="modZoneCounter('p2-field-badge', -1)">-</button>
                            <button class="c-btn plus" onclick="modZoneCounter('p2-field-badge', 1)">+</button>
                        </div>
                    </div>
                </div>
                <script>
                    for(let i=1; i<=5; i++) {
                        document.write(`
                        <div class="card-zone">
                            <div class="zone-title">MONSTER ${i}</div>
                            <div class="token-container">
                                <button class="btn-add-token" id="p2-m${i}-add-token" onclick="openTokenModal('p2-m${i}', 'PLAYER 2 - MONSTER ${i}')">+ Token</button>
                                <div class="token-display" id="p2-m${i}-token-display"></div>
                            </div>
                            <div class="spell-counter-container">
                                <div class="counter-badge" id="p2-m${i}-badge">🔮 0</div>
                                <div class="counter-btns">
                                    <button class="c-btn minus" onclick="modZoneCounter('p2-m${i}-badge', -1)">-</button>
                                    <button class="c-btn plus" onclick="modZoneCounter('p2-m${i}-badge', 1)">+</button>
                                </div>
                            </div>
                        </div>`);
                    }
                </script>
                <div class="card-zone"><div class="zone-title">GY</div></div>
            </div>
        </div>

        <div class="calculator-box">
            <div class="screen-row">
                <div id="p2-screen" class="input-screen">0</div>
                <button class="key key-half" onclick="halfLp(2)">½</button>
            </div>
            <div class="keyboard-grid">
                <button class="key" onclick="numPress(2, 7)">7</button>
                <button class="key" onclick="numPress(2, 8)">8</button>
                <button class="key" onclick="numPress(2, 9)">9</button>
                <button class="key key-clear" onclick="clearPress(2)">C</button>
                <button class="key" onclick="numPress(2, 4)">4</button>
                <button class="key" onclick="numPress(2, 5)">5</button>
                <button class="key" onclick="numPress(2, 6)">6</button>
                <button class="key key-op key-minus" onclick="applyLp(2, '-')">-</button>
                <button class="key" onclick="numPress(2, 1)">1</button>
                <button class="key" onclick="numPress(2, 2)">2</button>
                <button class="key" onclick="numPress(2, 3)">3</button>
                <button class="key key-op key-plus" style="grid-row: span 2; height: 100%;" onclick="applyLp(2, '+')">+</button>
                <button class="key" onclick="numPress(2, 0)">0</button>
                <button class="key" style="grid-column: span 2;" onclick="doubleZeroPress(2)">00</button>
            </div>
        </div>
    </div>

    <!-- THANH TIỆN ÍCH TRUNG TÂM -->
    <div class="center-tools">
        <div class="util-btns">
            <button class="tool-btn" onclick="rollDice()">🎲 Đổ Xúc Xắc</button>
            <button class="tool-btn" onclick="flipCoin()">🪙 Tung Đồng Xu</button>
            <button class="tool-btn" onclick="clearAllTokensAndCounters()">🗑️ Dọn Field</button>
            <button class="tool-btn btn-reset-match" onclick="resetMatch()">🔄 Reset Trận Đấu</button>
        </div>
    </div>

    <!-- P1 (HƯỚNG THUẬN) -->
    <div id="player-1-side" class="player-half">
        <div class="lp-panel">
            <div class="player-tag">PLAYER 1 (YOU)</div>
            <div id="p1-lp" class="lp-value">8000</div>
            <div id="p1-log" class="change-log"></div>
            
            <!-- ĐỒNG HỒ P1 -->
            <div class="timer-widget">
                <div class="timer-display" id="p1-timer-display">03:00</div>
                <div class="timer-controls">
                    <button class="t-btn play-btn" onclick="startTimer(1)">▶️ Play</button>
                    <button class="t-btn pause-btn" onclick="pauseTimer(1)">⏸️ Pause</button>
                    <button class="t-btn add-btn" onclick="addTime(1)">+30s</button>
                </div>
            </div>
        </div>

        <div class="playmat-grid">
            <div class="mat-row">
                <div class="card-zone">
                    <div class="zone-title">FIELD</div>
                    <div class="spell-counter-container">
                        <div class="counter-badge" id="p1-field-badge">🔮 0</div>
                        <div class="counter-btns">
                            <button class="c-btn minus" onclick="modZoneCounter('p1-field-badge', -1)">-</button>
                            <button class="c-btn plus" onclick="modZoneCounter('p1-field-badge', 1)">+</button>
                        </div>
                    </div>
                </div>
                <script>
                    for(let i=1; i<=5; i++) {
                        document.write(`
                        <div class="card-zone">
                            <div class="zone-title">MONSTER ${i}</div>
                            <div class="token-container">
                                <button class="btn-add-token" id="p1-m${i}-add-token" onclick="openTokenModal('p1-m${i}', 'PLAYER 1 - MONSTER ${i}')">+ Token</button>
                                <div class="token-display" id="p1-m${i}-token-display"></div>
                            </div>
                            <div class="spell-counter-container">
                                <div class="counter-badge" id="p1-m${i}-badge">🔮 0</div>
                                <div class="counter-btns">
                                    <button class="c-btn minus" onclick="modZoneCounter('p1-m${i}-badge', -1)">-</button>
                                    <button class="c-btn plus" onclick="modZoneCounter('p1-m${i}-badge', 1)">+</button>
                                </div>
                            </div>
                        </div>`);
                    }
                </script>
                <div class="card-zone"><div class="zone-title">GY</div></div>
            </div>

            <div class="mat-row">
                <div class="card-zone"><div class="zone-title">EXTRA</div></div>
                <script>
                    for(let i=1; i<=5; i++) {
                        document.write(`
                        <div class="card-zone">
                            <div class="zone-title">S/T ${i}</div>
                            <div class="spell-counter-container">
                                <div class="counter-badge" id="p1-st${i}-badge">🔮 0</div>
                                <div class="counter-btns">
                                    <button class="c-btn minus" onclick="modZoneCounter('p1-st${i}-badge', -1)">-</button>
                                    <button class="c-btn plus" onclick="modZoneCounter('p1-st${i}-badge', 1)">+</button>
                                </div>
                            </div>
                        </div>`);
                    }
                </script>
                <div class="card-zone"><div class="zone-title">DECK</div></div>
            </div>
        </div>

        <div class="calculator-box">
            <div class="screen-row">
                <div id="p1-screen" class="input-screen">0</div>
                <button class="key key-half" onclick="halfLp(1)">½</button>
            </div>
            <div class="keyboard-grid">
                <button class="key" onclick="numPress(1, 7)">7</button>
                <button class="key" onclick="numPress(1, 8)">8</button>
                <button class="key" onclick="numPress(1, 9)">9</button>
                <button class="key key-clear" onclick="clearPress(1)">C</button>
                <button class="key" onclick="numPress(1, 4)">4</button>
                <button class="key" onclick="numPress(1, 5)">5</button>
                <button class="key" onclick="numPress(1, 6)">6</button>
                <button class="key key-op key-minus" onclick="applyLp(1, '-')">-</button>
                <button class="key" onclick="numPress(1, 1)">1</button>
                <button class="key" onclick="numPress(1, 2)">2</button>
                <button class="key" onclick="numPress(1, 3)">3</button>
                <button class="key key-op key-plus" style="grid-row: span 2; height: 100%;" onclick="applyLp(1, '+')">+</button>
                <button class="key" onclick="numPress(1, 0)">0</button>
                <button class="key" style="grid-column: span 2;" onclick="doubleZeroPress(1)">00</button>
            </div>
        </div>
    </div>

    <!-- OVERLAYS: THÔNG BÁO -->
    <div id="overlay-result" class="overlay-result">
        <div class="overlay-text-box" id="overlay-text"></div>
    </div>

    <!-- MODAL: TẠO/SỬA TOKEN -->
    <div id="token-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>TẠO TOKEN</h3>
            <p id="token-zone-label">Vùng: ...</p>
            <div class="input-group">
                <label>⚔️ ATK:</label>
                <input type="number" id="token-atk" value="0" min="0" max="99999" onfocus="this.select()">
            </div>
            <div class="input-group">
                <label>🛡️ DEF:</label>
                <input type="number" id="token-def" value="0" min="0" max="99999" onfocus="this.select()">
            </div>
            <div class="modal-actions">
                <button onclick="closeTokenModal()" class="btn-cancel">Hủy</button>
                <button onclick="confirmToken()" class="btn-confirm">Xác nhận</button>
            </div>
        </div>
    </div>

    <script>
        let gameData = { 1: { lp: 8000, input: "0" }, 2: { lp: 8000, input: "0" } };
        let countersState = {};
        let currentTokenZone = "";

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(freq, type, duration) {
            try {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = type || 'sine'; osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }
        function playClick() { playBeep(550, 'sine', 0.06); }
        function playCounterClick() { playBeep(750, 'triangle', 0.08); }
        function playUpdate() { playBeep(840, 'sine', 0.12); }
        function playTimeUp() { 
            playBeep(300, 'sawtooth', 0.4);
            setTimeout(() => playBeep(300, 'sawtooth', 0.4), 500);
            setTimeout(() => playBeep(300, 'sawtooth', 1.0), 1000);
        }

        /* ====== LOGIC ĐỒNG HỒ ĐẾM NGƯỢC ĐỘC LẬP ====== */
        let timers = {
            1: { duration: 180, interval: null, isRunning: false },
            2: { duration: 180, interval: null, isRunning: false }
        };

        function updateTimerDisplay(player) {
            let m = Math.floor(timers[player].duration / 60);
            let s = timers[player].duration % 60;
            let displayString = (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
            document.getElementById(`p${player}-timer-display`).innerText = displayString;
        }

        function startTimer(player) {
            if (timers[player].isRunning || timers[player].duration <= 0) return;
            playClick();
            timers[player].isRunning = true;
            document.getElementById(`p${player}-timer-display`).style.color = "#ffcc00"; 
            
            timers[player].interval = setInterval(() => {
                timers[player].duration--;
                updateTimerDisplay(player);
                
                if (timers[player].duration <= 0) {
                    clearInterval(timers[player].interval);
                    timers[player].isRunning = false;
                    document.getElementById(`p${player}-timer-display`).style.color = "#ff4444"; 
                    playTimeUp();
                    showOverlay(`⏰ HẾT GIỜ CỦA PLAYER ${player}!`);
                    hideOverlayLater();
                }
            }, 1000);
        }

        function pauseTimer(player) {
            if (!timers[player].isRunning) return;
            playClick();
            clearInterval(timers[player].interval);
            timers[player].isRunning = false;
        }

        function addTime(player) {
            playClick();
            timers[player].duration += 30; // Thêm 30s
            document.getElementById(`p${player}-timer-display`).style.color = "#ffcc00"; 
            updateTimerDisplay(player);
        }

        /* ====== TOKEN ====== */
        function openTokenModal(zoneId, label) {
            playClick(); currentTokenZone = zoneId;
            document.getElementById('token-zone-label').innerText = `Vùng: ${label}`;
            let displayEl = document.getElementById(`${zoneId}-token-display`);
            if(displayEl.classList.contains('active')) {
                document.getElementById('token-atk').value = displayEl.getAttribute('data-atk') || "0";
                document.getElementById('token-def').value = displayEl.getAttribute('data-def') || "0";
            } else {
                document.getElementById('token-atk').value = "0"; document.getElementById('token-def').value = "0";
            }
            document.getElementById('token-modal').style.display = 'flex';
        }
        function closeTokenModal() { playClick(); document.getElementById('token-modal').style.display = 'none'; }
        function confirmToken() {
            playUpdate();
            let atk = document.getElementById('token-atk').value || 0; let def = document.getElementById('token-def').value || 0;
            let displayEl = document.getElementById(`${currentTokenZone}-token-display`);
            let addBtn = document.getElementById(`${currentTokenZone}-add-token`);
            displayEl.setAttribute('data-atk', atk); displayEl.setAttribute('data-def', def);
            displayEl.innerHTML = `
                <div class="token-stats" onclick="openTokenModal('${currentTokenZone}', 'Sửa Token')">
                    ⚔️${atk}<br>🛡️${def}
                </div>
                <button class="btn-remove-token" onclick="removeToken(event, '${currentTokenZone}')">Xoá Token</button>
            `;
            displayEl.classList.add('active'); addBtn.style.display = 'none'; closeTokenModal();
        }
        function removeToken(event, zoneId) {
            event.stopPropagation(); playClick();
            let displayEl = document.getElementById(`${zoneId}-token-display`);
            let addBtn = document.getElementById(`${zoneId}-add-token`);
            displayEl.classList.remove('active'); displayEl.innerHTML = "";
            displayEl.removeAttribute('data-atk'); displayEl.removeAttribute('data-def');
            addBtn.style.display = 'inline-block';
        }

        /* ====== COUNTER ====== */
        function modZoneCounter(badgeId, amount) {
            playCounterClick();
            if (!countersState[badgeId]) countersState[badgeId] = 0;
            countersState[badgeId] += amount;
            if (countersState[badgeId] < 0) countersState[badgeId] = 0; 
            let badgeEl = document.getElementById(badgeId);
            badgeEl.innerText = `🔮 ${countersState[badgeId]}`;
            if (countersState[badgeId] > 0) { badgeEl.classList.add('active'); } else { badgeEl.classList.remove('active'); }
        }
        function clearAllTokensAndCounters() {
            if (confirm("Dọn dẹp sạch sẽ toàn bộ Counter và Token trên sân?")) {
                playUpdate();
                document.querySelectorAll('.counter-badge').forEach(b => { b.innerText = "🔮 0"; b.classList.remove('active'); });
                countersState = {};
                document.querySelectorAll('.token-display').forEach(t => { t.classList.remove('active'); t.innerHTML = ""; });
                document.querySelectorAll('.btn-add-token').forEach(b => { b.style.display = 'inline-block'; });
            }
        }

        /* ====== ĐIỂM GỐC ====== */
        function numPress(player, val) {
            playClick(); let current = gameData[player].input;
            if (current === "0") { gameData[player].input = val.toString(); } 
            else if (current.length < 5) { gameData[player].input += val.toString(); }
            updateScreen(player);
        }
        function doubleZeroPress(player) {
            playClick(); let current = gameData[player].input;
            if (current !== "0" && current.length < 4) { gameData[player].input += "00"; }
            updateScreen(player);
        }
        function clearPress(player) { playClick(); gameData[player].input = "0"; updateScreen(player); }
        function updateScreen(player) { document.getElementById(`p${player}-screen`).innerText = gameData[player].input; }

        function applyLp(player, operator) {
            let amount = parseInt(gameData[player].input);
            if (amount === 0 || isNaN(amount)) return;
            playUpdate();
            let oldLp = gameData[player].lp;
            let logEl = document.getElementById(`p${player}-log`);

            if (operator === '+') {
                gameData[player].lp += amount; logEl.innerText = `+${amount}`; logEl.style.color = "#44ff88";
            } else {
                gameData[player].lp -= amount; logEl.innerText = `-${amount}`; logEl.style.color = "#ff5577";
            }
            updateLpDisplay(player, oldLp, logEl);
        }

        function halfLp(player) {
            let oldLp = gameData[player].lp;
            if (oldLp <= 0) return;
            playUpdate();
            gameData[player].lp = Math.ceil(oldLp / 2);
            let logEl = document.getElementById(`p${player}-log`);
            logEl.innerText = `÷ 2 (Half)`; logEl.style.color = "#ffcc00";
            updateLpDisplay(player, oldLp, logEl);
        }

        function updateLpDisplay(player, oldLp, logEl) {
            if (gameData[player].lp <= 0) {
                gameData[player].lp = 0;
                document.getElementById(`p${player}-lp`).classList.add('dead');
            } else {
                document.getElementById(`p${player}-lp`).classList.remove('dead');
            }
            animateLp(document.getElementById(`p${player}-lp`), oldLp, gameData[player].lp);
            gameData[player].input = "0";
            updateScreen(player);
            setTimeout(() => { 
                if (logEl.innerText.includes(Math.abs(gameData[player].lp - oldLp).toString()) || logEl.innerText.includes("Half")) { logEl.innerText = ""; } 
            }, 3500);
        }

        function animateLp(element, start, end) {
            let duration = 350; let startTime = null;
            function process(timestamp) {
                if (!startTime) startTime = timestamp;
                let progress = Math.min((timestamp - startTime) / duration, 1);
                let currentVal = Math.floor(start + progress * (end - start));
                element.innerText = currentVal;
                if (progress < 1) { window.requestAnimationFrame(process); } else { element.innerText = end; }
            }
            window.requestAnimationFrame(process);
        }

        /* ====== TIỆN ÍCH ====== */
        function rollDice() {
            playClick(); showOverlay("🎲 Đang lắc xúc xắc...");
            setTimeout(() => {
                let res = Math.floor(Math.random() * 6) + 1;
                showOverlay(`🎲 Kết quả: Mặt ${res}`); hideOverlayLater();
            }, 500);
        }
        function flipCoin() {
            playClick(); showOverlay("🪙 Đang tung đồng xu...");
            setTimeout(() => {
                let res = Math.random() < 0.5 ? "SẤP (Heads)" : "NGỬA (Tails)";
                showOverlay(`🪙 Kết quả: ${res}`); hideOverlayLater();
            }, 500);
        }
        function showOverlay(text) {
            document.getElementById('overlay-text').innerText = text;
            document.getElementById('overlay-result').style.display = 'flex';
        }
        function hideOverlayLater() { setTimeout(() => { document.getElementById('overlay-result').style.display = 'none'; }, 2000); }
        
        function resetMatch() {
            if (confirm("Thiết lập lại trận đấu? Toàn bộ LP, Counter, Token và Thời gian sẽ được đặt lại.")) {
                playUpdate();
                // Reset LP
                gameData = { 1: { lp: 8000, input: "0" }, 2: { lp: 8000, input: "0" } };
                document.getElementById('p1-lp').innerText = "8000"; document.getElementById('p2-lp').innerText = "8000";
                document.getElementById('p1-lp').classList.remove('dead'); document.getElementById('p2-lp').classList.remove('dead');
                document.getElementById('p1-log').innerText = ""; document.getElementById('p2-log').innerText = "";
                updateScreen(1); updateScreen(2);
                
                // Reset Counter & Token
                document.querySelectorAll('.counter-badge').forEach(b => { b.innerText = "🔮 0"; b.classList.remove('active'); });
                countersState = {};
                document.querySelectorAll('.token-display').forEach(t => { t.classList.remove('active'); t.innerHTML = ""; });
                document.querySelectorAll('.btn-add-token').forEach(b => { b.style.display = 'inline-block'; });

                // Reset Timers
                [1, 2].forEach(p => {
                    pauseTimer(p);
                    timers[p].duration = 180;
                    document.getElementById(`p${p}-timer-display`).style.color = "#ffcc00";
                    updateTimerDisplay(p);
                });
            }
        }
    </script>
</body>
</html>
